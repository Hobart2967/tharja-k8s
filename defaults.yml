        - username: ntfy_grafana_user
          password: ntfy_grafana_password
          topics:
            - name: server_alerts
              level: read-write

        - username: ntfy_homeserver_user
          password: ntfy_homeserver_password
          topics:
            - name: backups
              level: read-write
            - name: homeserver_alerts
              level: read-write
    dns:
      - zone: ntfy.codewyre.net
        properties: $TTL    7200
        entries:
          - name: ntfy.codewyre.net.
            type: SOA
            value: |
              ns1.ntfy.codewyre.net. admin.ntfy.codewyre.net. (
                    {{ now().strftime('%Y%m%d') }}01      ; Serial
                    7200            ; Refresh
                    900            ; Retry
                    604800          ; Expire
                    7200)           ; NegativeCacheTTL
          - name: ''
            type: NS
            value: ns1.codewyre.net.
          - name: ns1
            type: A
            private: true
            value: server_default_ip
          - name: _acme-challenge
            type: NS
            value: ns1.ntfy.codewyre.net.
          - name: ntfy.codewyre.net.
            type: A
            private: true
            value: server_default_ip
    web:
      rate_limit:
        zone_size: 10m
        rate: 20r/s
        zone: net_codewyre_ntfy
        extras: burst=30 nodelay
      domain:
        name: ntfy.codewyre.net
        aliases: []
    docker:
      subnet: "172.126.0.0/24"
      gateway: "172.126.0.1"
      containers:
        ntfy:
          image: binwiederhier/ntfy
          command:
            - serve
          environment:
            TZ: UTC
            NTFY_AUTH_DEFAULT_ACCESS: deny-all
            NTFY_BEHIND_PROXY: true
            NTFY_AUTH_FILE: /etc/ntfy/auth.db
            NTFY_ENABLE_LOGIN: true
            NTFY_REQUIRE_LOGIN: true
          volumes:
            - /var/cache/ntfy:/var/cache/ntfy
            - ./etc/ntfy:/etc/ntfy
          healthcheck: # optional: remember to adapt the host:port to your environment
              test: ["CMD-SHELL", "wget -q --tries=1 http://localhost:80/v1/health -O - | grep -Eo '\"healthy\"\\s*:\\s*true' || exit 1"]
              interval: 60s
              timeout: 10s
              retries: 3
              start_period: 40s
          restart: unless-stopped
          networks:
            nat:
              ipv4_address: 172.126.0.2
        grafana_ntfy_proxy:
          image: saibe1111/grafana-to-ntfy
          restart: unless-stopped
          environment:
            NTFY_TOPIC: server_alerts
            NTFY_SERVER: https://ntfy.codewyre.net
            NTFY_TOKEN:
              secret: ntfy_grafana_access_token
          networks:
            nat:
              ipv4_address: 172.126.0.3

