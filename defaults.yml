#launchpad_mirror: https://launchpad.net/ubuntu/

arch: amd64

default_user: hobart
default_user_name: Hobart2967
default_user_email: hobart2967@outlook.com

secrets: {}
grafana:
  imported_dashboards:
    - name: "System"
      source_url: https://grafana.com/api/dashboards/1860/revisions/40/download
      dest: dashboard-system.json
      inputs:
        - variable: DS_PROMETHEUS
          value: prometheus
    - name: "SSH"
      source_url: https://grafana.com/api/dashboards/17514/revisions/3/download
      dest: dashboard-ssh.json
      inputs:
        - variable: DS_LOKI
          value: loki
    - name: "Certificates"
      source_url: https://grafana.com/api/dashboards/13230/revisions/2/download
      dest: dashboard-cert.json
      inputs:
        - variable: DS_PROMETHEUS
          value: prometheus
  contact_points:
    - uid: 04bae0d0-2018-40d7-a3fe-3c3ec13ab2bd
      name: Discord
      type: discord
      discord_url: grafana_discord_webhook

asdf_vm_version: 0.16.5
asdf_vm_plugins:
  - name: nodejs
    packages:
      - name: 18.20.7
      - name: 22.5.1
        default: true

  - name: java
    packages:
      - name: corretto-21.0.6.7.1
        default: true
      - name: corretto-11.0.26.4.1
      - name: corretto-17.0.11.9.1
      - name: corretto-19.0.2.7.1

  - name: python
    packages:
      - name: 3.13.1
        default: true

  - name: awscli
    packages:
      - name: 2.23.13
        default: true

  - name: dotnet-core
    packages:
    - name: 6.0.425
      default: true

  - name: maven
    packages:
    - name: 3.9.6
      default: true

  - name: terraform
    packages:
    - name: 1.11.0
      default: true

security:
  # Enables acquisition of certificates during provisioning. Otherwise, run `cert-renew <domain>` manually afterwards
  renew_certs: true

  fail2ban:
    maxretry: 3
    bantime: 43200
    report:
      active: false
      #data: 'my/keepass/entry/path' # TODO: move this to 1pw or something else

  firewall:
    docker_subnets:
      - 172.0.0.0/8

    ipsets:
      - name: banned-web
        entries: []
        type: hash:net

    in:
      - description: SSH
        port: 22
        protocol: tcp
      - description: HTTP # Will automatically be redirected to HTTPS
        port: 80
        protocol: tcp
      - description: HTTPS
        port: 443
        protocol: tcp
dns:
  disable_recursion: true

vhosts:
  - id: net.adventurespiele
    user: avsn
    name: Adventurespiele.net
    certs:
      - domain: adventurespiele.net
        email: admin@adventurespiele.net
        minute: "05"
        hour: "03"
    dns:
      - zone: adventurespiele.net
        properties: $TTL    7200
        entries:
          - name: adventurespiele.net.
            type: SOA
            value: |
              ns1.adventurespiele.net. admin.adventurespiele.net. (
                    {{ now().strftime('%Y%m%d') }}01      ; Serial
                    7200            ; Refresh
                    900            ; Retry
                    604800          ; Expire
                    7200)           ; NegativeCacheTTL
          - name: ''
            type: NS
            value: ns1.first-ns.de.
          - name: ''
            type: NS
            value: robotns2.second-ns.de.
          - name: _acme-challenge
            type: NS
            value: ns1.adventurespiele.net.
          - name: ns1
            type: A
            private: true
            value: server_default_ip
          - name: mail
            type: A
            private: true
            value: server_default_ip
          - name: 'adventurespiele.net.'
            type: MX
            value: "10 mail.adventurespiele.net."
          - name: adventurespiele.net.
            type: A
            private: true
            value: server_default_ip
          - name: www
            type: A
            private: true
            value: server_default_ip

    files:
      - from: vhosts/net.adventurespiele/etc/fail2ban/filter.d/postnuke-hack-attempts.conf
        to: /etc/fail2ban/filter.d/postnuke-hack-attempts.conf
      - from: vhosts/net.adventurespiele/etc/nginx/reverse-proxy.conf.j2
        to: /etc/nginx/reverse-proxy.conf
      - from: .backupignore
        to: /.backupignore
    databases:
      - host: database
        network: deavsn_default
        port: 3306
        password: de_avsn_mariadb_root_password
        name: usr_web1_1
        users:
          - name: web1
            password: de_avsn_mariadb_web1
            hosts:
              - '%' # Needs to be the host from where the client logs in.
    docker:
      subnet: "172.118.0.0/24"
      gateway: "172.118.0.1"
      files:
        - from: vhosts/net.adventurespiele/etc/apache2/httpd.conf.j2
          to: /etc/apache2/httpd.conf
        - from: vhosts/net.adventurespiele/etc/php5/php.ini.j2
          to: /etc/php5/php.ini
        - from: vhosts/net.adventurespiele/etc/mariadb/.env.j2
          to: /etc/mariadb/.env
      containers:
        facade:
          image: hobart2967/docker-apache2-php5.6.40
          depends_on:
            - database
          volumes:
            - ./httpdocs:/var/www/html
            - ./etc/apache2/httpd.conf:/etc/apache2/apache2.conf
            - ./etc/php5/php.ini:/usr/local/etc/php/php.ini
          networks:
            nat:
              ipv4_address: 172.118.0.2
        database:
          image: mariadb
          restart: always
          env_file: ./etc/mariadb/.env
          volumes:
            - ./database:/var/lib/mysql
          networks:
            nat:
              ipv4_address: 172.118.0.3

    web:
      rate_limit:
        zone_size: 10m
        rate: 20r/s
        zone: net_adventurespiele
        extras: burst=30 nodelay
      domain:
        name: adventurespiele.net
        aliases:
          - www.adventurespiele.net

    mailboxes: mailbox/avsn.de

  - id: engineer.marcoklein
    name: marcoklein.engineer
    user: marco
    certs:
      - domain: marcoklein.engineer
        email: admin@adventurespiele.net
        zone_file: /var/lib/bind/zones/engineer.marcoklein/db.engineer.marcoklein
        minute: "25"
        hour: "03"
    files:
      - from: vhosts/engineer.marcoklein/etc/nginx/reverse-proxy.conf.j2
        to: /etc/nginx/reverse-proxy.conf
    docker:
      subnet: "172.119.0.0/24"
      gateway: "172.119.0.1"
      containers:
        facade:
          image: nginx:latest
          restart: unless-stopped
          volumes:
            - ./httpdocs:/usr/share/nginx/html
          networks:
            nat:
              ipv4_address: 172.119.0.2
    dns:
      - zone: marcoklein.engineer
        properties: $TTL    7200
        entries:
          - name: marcoklein.engineer.
            type: SOA
            value: |
              ns1.marcoklein.engineer. admin.marcoklein.engineer. (
                    {{ now().strftime('%Y%m%d') }}01      ; Serial
                    7200            ; Refresh
                    900            ; Retry
                    604800          ; Expire
                    7200)           ; NegativeCacheTTL
          - name: ''
            type: NS
            value: ns1.first-ns.de.
          - name: ''
            type: NS
            value: robotns2.second-ns.de.
          - name: ns1
            type: A
            private: true
            value: server_default_ip
          - name: _acme-challenge
            type: NS
            value: ns1.marcoklein.engineer.
          - name: marcoklein.engineer.
            type: MX
            value: "10 mail.marcoklein.engineer."
          - name: marcoklein.engineer.
            type: A
            private: true
            value: server_default_ip
          - name: mail
            type: A
            private: true
            value: server_default_ip
          - name: www
            type: A
            private: true
            value: server_default_ip
    web:
      rate_limit:
        zone_size: 10m
        rate: 20r/s
        zone: engineer_marcoklein
        extras: burst=30 nodelay
      domain:
        name: marcoklein.engineer
        aliases:
          - www.marcoklein.engineer
    mailboxes: mailbox/marcoklein.engineer

