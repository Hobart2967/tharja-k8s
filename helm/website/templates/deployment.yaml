---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Release.Name }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Release.Name }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      volumes:
      - name: {{ .Release.Name }}
        persistentVolumeClaim:
          claimName: {{ .Release.Name }}
      containers:
      - name: {{ .Release.Name }}-ssh
        image: lscr.io/linuxserver/openssh-server:latest
        env:
        - name: USER_NAME
          value: backup
        - name: USER_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-ssh
              key: password

        - name: PUID
          value: "1000"

        - name: PGID
          value: "1000"

        ports:
        - containerPort: 2222

        volumeMounts:
        - name: {{ .Release.Name }}
          mountPath: /backups/httpdocs
          readOnly: true
      - name: {{ .Release.Name }}
        image: {{ .Values.webfacade.image }}
        ports: {{ .Values.webfacade.ports | toYaml | nindent 8 }}
        volumeMounts:
          - name: {{ .Release.Name }}
            mountPath: /var/www/html
        resources:
          limits:
            cpu: {{ .Values.webfacade.resources.limits.cpu }}
            memory: {{ .Values.webfacade.resources.limits.memory }}
          requests:
            cpu: {{ .Values.webfacade.resources.requests.cpu }}
            memory: {{ .Values.webfacade.resources.requests.memory }}