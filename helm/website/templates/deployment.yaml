---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Release.Name }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Release.Name }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
      - name: {{ .Release.Name }}
        image: {{ .Values.webfacade.image }}
        ports: {{ .Values.webfacade.ports | toYaml | nindent 8 }}
        resources:
          limits:
            cpu: {{ .Values.webfacade.resources.limits.cpu }}
            memory: {{ .Values.webfacade.resources.limits.memory }}
          requests:
            cpu: {{ .Values.webfacade.resources.requests.cpu }}
            memory: {{ .Values.webfacade.resources.requests.memory }}