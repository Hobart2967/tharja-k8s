# Default values for monitoring-stack
# This is a YAML-formatted file.

namespace: monitoring

# Global image settings
image:
  pullPolicy: IfNotPresent

# Prometheus configuration
prometheus:
  enabled: true
  replicas: 1
  image: prom/prometheus:latest
  port: 9090

  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 500m

  retention: 7d
  retentionSize: 10Gi

  # Storage configuration
  persistence:
    enabled: true
    size: 10Gi
    storageClassName: local-path

  # Service configuration
  service:
    type: ClusterIP
    port: 9090

# Grafana configuration
grafana:
  enabled: true
  replicas: 1
  image: grafana/grafana:latest
  port: 3000

  resources:
    requests:
      memory: 128Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: 200m

  # Storage configuration
  persistence:
    enabled: true
    size: 2Gi
    storageClassName: local-path

  # Service configuration
  service:
    type: ClusterIP
    port: 3000

  # Grafana admin credentials
  adminUser: admin
  adminPassword: admin123  # Change this in production

# Loki configuration
loki:
  enabled: true
  replicas: 1
  image: grafana/loki:2.9.8
  port: 3100

  resources:
    requests:
      memory: 128Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: 200m

  # Storage configuration
  persistence:
    enabled: true
    size: 5Gi
    storageClassName: local-path

  # Service configuration
  service:
    type: ClusterIP
    port: 3100

# Promtail configuration
promtail:
  enabled: true
  replicas: 1
  image: grafana/promtail:2.9.8

  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 128Mi
      cpu: 100m

# Node Exporter configuration
nodeExporter:
  enabled: true
  image: prom/node-exporter:latest
  port: 9100

  resources:
    requests:
      memory: 32Mi
      cpu: 50m
    limits:
      memory: 64Mi
      cpu: 100m

  # Service configuration
  service:
    type: ClusterIP
    port: 9100

# Blackbox Exporter configuration
blackboxExporter:
  enabled: true
  replicas: 1
  image: quay.io/prometheus/blackbox-exporter:latest
  port: 9115

  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 128Mi
      cpu: 100m

  # Service configuration
  service:
    type: ClusterIP
    port: 9115

# Alertmanager configuration
alertmanager:
  enabled: true
  replicas: 1
  image: prom/alertmanager:latest
  port: 9093

  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 128Mi
      cpu: 100m

  # Storage configuration
  persistence:
    enabled: true
    size: 1Gi
    storageClassName: local-path

  # Service configuration
  service:
    type: ClusterIP
    port: 9093
