fullnameOverride: loki

deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
    ring:
      kvstore:
        store: inmemory
  ingester:
    lifecycler:
      ring:
        kvstore:
          store: inmemory
        replication_factor: 1
  distributor:
    ring:
      kvstore:
        store: inmemory
  ruler:
    ring:
      kvstore:
        store: inmemory
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h
  storage:
    type: filesystem
  limits_config:
    reject_old_samples: true
    reject_old_samples_max_age: 168h

singleBinary:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  persistence:
    enabled: true
    storageClass: local-path
    size: 5Gi

backend:
  replicas: 0

read:
  replicas: 0

write:
  replicas: 0

# Disable memcached caches - not needed for a single-binary filesystem setup
chunksCache:
  enabled: false

resultsCache:
  enabled: false

# Disable minio - using filesystem storage instead
minio:
  enabled: false

# Disable canary - not needed
lokiCanary:
  enabled: false

# Disable helm tests (required when canary is disabled)
test:
  enabled: false

gateway:
  enabled: false

monitoring:
  serviceMonitor:
    enabled: true
