{{- if .Values.promtail.enabled }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  namespace: {{ .Values.namespace }}
  labels:
    app: promtail
spec:
  selector:
    matchLabels:
      app: promtail
  template:
    metadata:
      labels:
        app: promtail
    spec:
      serviceAccountName: promtail
      containers:
      - name: promtail
        image: {{ .Values.promtail.image }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        args:
          - '-config.file=/etc/promtail/promtail-config.yml'
        resources:
          requests:
            memory: {{ .Values.promtail.resources.requests.memory }}
            cpu: {{ .Values.promtail.resources.requests.cpu }}
          limits:
            memory: {{ .Values.promtail.resources.limits.memory }}
            cpu: {{ .Values.promtail.resources.limits.cpu }}
        volumeMounts:
        - name: config
          mountPath: /etc/promtail
        - name: varlog
          mountPath: /var/log
          readOnly: true
        - name: varlibdockercontainers
          mountPath: /var/lib/docker/containers
          readOnly: true
        - name: etcmachineid
          mountPath: /etc/machine-id
          readOnly: true
      volumes:
      - name: config
        configMap:
          name: promtail-config
      - name: varlog
        hostPath:
          path: /var/log
      - name: varlibdockercontainers
        hostPath:
          path: /var/lib/docker/containers
      - name: etcmachineid
        hostPath:
          path: /etc/machine-id
{{- end }}
