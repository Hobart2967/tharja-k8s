apiVersion: v1
kind: ConfigMap
metadata:
  name: blackbox-config
  namespace: {{ .Values.namespace }}
data:
  blackbox.yml: |
    modules:
      http_2xx:
        prober: http
        timeout: 5s
        http:
          valid_http_versions: ["HTTP/1.1", "HTTP/2"]
          follow_redirects: true
          preferred_ip_protocol: ip4

      http_post_2xx:
        prober: http
        timeout: 5s
        http:
          method: POST
          valid_http_versions: ["HTTP/1.1", "HTTP/2"]
          follow_redirects: true
          preferred_ip_protocol: ip4

      tcp_connect:
        prober: tcp
        timeout: 5s

      pop3s_banner:
        prober: tcp
        timeout: 5s
        tcp:
          query_response:
            - expect: "^+OK"
          tls: true
          tls_config:
            insecure_skip_verify: false

      grpc:
        prober: grpc
        timeout: 5s
        grpc:
          tls: true
          preferred_ip_protocol: ip4

      grpc_plain:
        prober: grpc
        timeout: 5s
        grpc:
          tls: false
