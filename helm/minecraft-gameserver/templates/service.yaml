---
kind: Service
apiVersion: v1
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ .Release.Name }}
  ports:
    - name: game
      port: {{ .Values.serverConfig.serverPort }}
      targetPort: {{ .Values.serverConfig.serverPort }}