---
{{ $release := .Release }}

{{- $extraFiles := dict
  "banned-ips-json"      "banned-ips.json"
  "banned-players-json"  "banned-players.json"
  "boot-sh"              "boot.sh"
  "bukkit-yml"           "bukkit.yml"
  "commands-yml"         "commands.yml"
  "ops-json"             "ops.json"
  "server-properties"    "server.properties"
  "permissions-yml"      "permissions.yml"
  "spigot-yml"           "spigot.yml"
  "whitelist-json"       "whitelist.json"
}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Release.Name }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Release.Name }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: {{ .Release.Name }}-rcon
          image: "hobart2967/mcrcon:1.0.1"
          imagePullPolicy: IfNotPresent
          tty: true
          stdin: true
        - name: {{ .Release.Name }}
          image: "hobart2967/docker-spigot-mc-1.20.1:1.0.0"
          imagePullPolicy: IfNotPresent
          entrypoint: ["/bin/sh", "-c", "/minecraft/server/boot.sh"]
          ports:
            - name: game
              containerPort: {{ .Values.serverConfig.serverPort }}
              protocol: TCP
          volumeMounts:
            - name: worlds
              mountPath: /minecraft/server/worlds
            - name: backups
              mountPath: /minecraft/server/backups
            - name: plugins-available
              mountPath: /minecraft/server/plugins-available
            - name: plugins
              mountPath: /minecraft/server/plugins
            {{- range $name, $path := $extraFiles }}
            - name: config
              mountPath: /minecraft/server/{{ $path }}
              subPath: {{ $path }}
            {{- end }}
      volumes:
        - name: {{ .Release.Name}}-worlds
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-worlds
        - name: {{ .Release.Name}}-backups
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-backups
        - name: {{ .Release.Name}}-pluginsAvailable
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-pluginsAvailable
        - name: {{ .Release.Name}}-plugins
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-plugins
        {{- range $name, $path := $extraFiles }}
        - name: config
          configMap:
            # Provide the name of the ConfigMap you want to mount.
            name: {{ $release.Name }}-{{ $name }}
            # An array of keys from the ConfigMap to create as files
            items:
            - key: "content"
              path: "{{ $path }}"
        {{- end }}