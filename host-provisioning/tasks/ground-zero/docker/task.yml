---

- name: Copy docker-tool-list-nics from ./docker-tool-list-nics.sh to /usr/bin/docker-tool-list-nics
  ansible.builtin.copy:
    src: ./docker-tool-list-nics.sh
    dest: /usr/bin/docker-tool-list-nics
    mode: '0777'

- name: Make sure a docker service is running
  become: true
  ansible.builtin.systemd_service:
    state: started
    name: docker